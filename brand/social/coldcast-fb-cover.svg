<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 312" width="820" height="312">
  <defs>
    <linearGradient id="fb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#233f9e" />
      <stop offset="0.5" stop-color="#3257d6" />
      <stop offset="1" stop-color="#6d3df0" />
    </linearGradient>
    <radialGradient id="fb-cyan" cx="720" cy="0" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.5" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="fb-mag" cx="90" cy="330" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d946ef" stop-opacity="0.45" />
      <stop offset="1" stop-color="#d946ef" stop-opacity="0" />
    </radialGradient>
    <pattern id="fb-grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
    <g id="fb-swirl" stroke="#ffffff" stroke-width="11" stroke-linecap="round" fill="none">
      <g transform="rotate(0 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(60 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(120 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(180 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(240 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(300 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
    </g>
  </defs>

  <rect width="820" height="312" fill="url(#fb-bg)" />
  <rect width="820" height="312" fill="url(#fb-cyan)" />
  <rect width="820" height="312" fill="url(#fb-mag)" />
  <rect width="820" height="312" fill="url(#fb-grid)" />

  <use href="#fb-swirl" transform="translate(600 -40) scale(1.9)" opacity="0.12" />
  <use href="#fb-swirl" transform="translate(-46 150) scale(1.25)" opacity="0.10" />
  <use href="#fb-swirl" transform="translate(548 150) scale(0.72)" opacity="0.15" />

  <!-- centered copy (kept within the mobile-safe centre ~640px) -->
  <text x="410" y="142" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="33" font-weight="700" letter-spacing="-0.5" fill="#ffffff">GTM data tools for outbound teams</text>
  <text x="410" y="178" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16.5" font-weight="500" letter-spacing="0.2" fill="#ffffff" fill-opacity="0.92">Export &amp; enrich leads &#160;&#183;&#160; Find &amp; verify emails &#160;&#183;&#160; Clean your lists</text>

  <rect x="343" y="200" width="134" height="32" rx="16" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" />
  <text x="410" y="221" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="0.3" fill="#ffffff">coldcast.io</text>
</svg>
