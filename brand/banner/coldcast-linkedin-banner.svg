<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1214" />
      <stop offset="0.5" stop-color="#0b0e10" />
      <stop offset="1" stop-color="#08090b" />
    </linearGradient>
    <radialGradient id="cyan" cx="985" cy="-10" r="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ccff00" stop-opacity="0.22" />
      <stop offset="1" stop-color="#ccff00" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="mag" cx="120" cy="215" r="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35e0b8" stop-opacity="0.18" />
      <stop offset="1" stop-color="#35e0b8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="lift" cx="564" cy="95" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b1f23" stop-opacity="0.6" />
      <stop offset="1" stop-color="#1b1f23" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
    <g id="swirl" stroke="#ccff00" stroke-width="11" stroke-linecap="round" fill="none">
      <g transform="rotate(0 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ccff00" stroke="none" /></g>
      <g transform="rotate(60 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ccff00" stroke="none" /></g>
      <g transform="rotate(120 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ccff00" stroke="none" /></g>
      <g transform="rotate(180 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ccff00" stroke="none" /></g>
      <g transform="rotate(240 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ccff00" stroke="none" /></g>
      <g transform="rotate(300 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ccff00" stroke="none" /></g>
    </g>
  </defs>

  <!-- background + ambient color -->
  <rect width="1128" height="191" fill="url(#bg)" />
  <rect width="1128" height="191" fill="url(#lift)" />
  <rect width="1128" height="191" fill="url(#cyan)" />
  <rect width="1128" height="191" fill="url(#mag)" />
  <rect width="1128" height="191" fill="url(#grid)" />

  <!-- decorative brand swirls -->
  <use href="#swirl" transform="translate(872 -46) scale(2.25)" opacity="0.13" />
  <use href="#swirl" transform="translate(-26 64) scale(1.5)" opacity="0.10" />
  <use href="#swirl" transform="translate(792 96) scale(0.85)" opacity="0.16" />

  <!-- copy -->
  <text x="564" y="80" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="41" font-weight="700" letter-spacing="-0.6" fill="#f4f7f6">GTM data tools for outbound teams</text>
  <text x="564" y="116" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20.5" font-weight="500" letter-spacing="0.2" fill="#a7b0ad">Export &amp; enrich leads &#160;&#183;&#160; Find &amp; verify emails &#160;&#183;&#160; Clean your lists</text>

  <!-- url chip -->
  <rect x="497" y="138" width="134" height="31" rx="15.5" fill="#ccff00" fill-opacity="0.10" stroke="#ccff00" stroke-opacity="0.35" stroke-width="1" />
  <text x="564" y="159" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="0.3" fill="#d9ff4d">coldcast.io</text>
</svg>
