<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Coldcast social card — LIME field, near-black type.
       Built to win a scroll, not to match the site: a feed is a wall of white
       and blue cards, so the card that is neither gets the click. Lime at
       luminance 0.84 is the loudest thing this brand owns.
       Every ink is #0a0a0a (15.2:1 on lime). The logo INVERTS here — a graphite
       tile with a lime mark — because the normal lime tile would vanish into
       the field. -->
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="0.65" y2="1">
      <stop offset="0" stop-color="#d9ff4d" />
      <stop offset="0.55" stop-color="#ccff00" />
      <stop offset="1" stop-color="#bff000" />
    </linearGradient>
    <!-- depth without dirtying the lime: a soft dark bloom in the corners -->
    <radialGradient id="og-vignette" cx="600" cy="315" r="760" gradientUnits="userSpaceOnUse">
      <stop offset="0.55" stop-color="#0a0a0a" stop-opacity="0" />
      <stop offset="1" stop-color="#0a0a0a" stop-opacity="0.14" />
    </radialGradient>
    <pattern id="og-grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#0a0a0a" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
    <g id="og-swirl" stroke="#0a0a0a" stroke-width="2.4" stroke-linecap="round" fill="none">
      <path d="M16 16 C16 10.5 19 8 23.5 8" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(60 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(120 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(180 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(240 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(300 16 16)" />
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)" />
  <rect width="1200" height="630" fill="url(#og-grid)" />
  <rect width="1200" height="630" fill="url(#og-vignette)" />

  <!-- oversized watermark mark, bottom-right, barely there -->
  <use href="#og-swirl" transform="translate(940 330) scale(9)" opacity="0.06" />

  <!-- brand lockup: INVERTED — graphite tile, lime mark -->
  <g transform="translate(64 60) scale(1.75)">
    <rect width="32" height="32" rx="8" fill="#0a0a0a" />
    <g stroke="#ccff00" stroke-width="2.4" stroke-linecap="round" fill="none">
      <path d="M16 16 C16 10.5 19 8 23.5 8" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(60 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(120 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(180 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(240 16 16)" />
      <path d="M16 16 C16 10.5 19 8 23.5 8" transform="rotate(300 16 16)" />
    </g>
  </g>
  <text x="132" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="700" letter-spacing="-0.4" fill="#0a0a0a">Coldcast.io</text>

  <!-- Left-aligned: a feed thumbnail is small and often cropped, and the eye
       lands left. Centred type loses its first word to the crop. -->
  <text x="64" y="212" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="2.6" fill="#0a0a0a" fill-opacity="0.62">TESTED BY 10,000+ SALES PROFESSIONALS</text>

  <text x="64" y="300" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-2" fill="#0a0a0a">The world&#8217;s safest</text>
  <text x="64" y="382" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-2" fill="#0a0a0a">Sales Navigator scraper</text>

  <text x="64" y="444" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="500" letter-spacing="0.1" fill="#0a0a0a" fill-opacity="0.72">Apify alternative &#160;&#183;&#160; triple-verified emails &amp; phones &#160;&#183;&#160; 0 ban risk</text>

  <!-- The click cue: a solid graphite button. On a lime field the dark pill is
       the only "pressable" shape on the card, so the eye ends on it. -->
  <rect x="64" y="500" width="286" height="62" rx="31" fill="#0a0a0a" />
  <text x="106" y="539" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="700" letter-spacing="0.2" fill="#ccff00">Export 20,000/day</text>
  <path d="M300 531h22M314 523l8 8-8 8" stroke="#ccff00" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <text x="378" y="539" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="21" font-weight="600" letter-spacing="0.2" fill="#0a0a0a" fill-opacity="0.66">1-day free trial &#183; no card</text>
</svg>
