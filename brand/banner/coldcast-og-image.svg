<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- The Ledger brand — warm paper, warm ink, one cobalt accent -->
  <rect width="1200" height="630" fill="#F7F4ED" />

  <!-- ruled ledger lines -->
  <g stroke="#171410" stroke-opacity="0.08" stroke-width="1">
    <line x1="80" y1="470" x2="1120" y2="470" />
    <line x1="80" y1="516" x2="1120" y2="516" />
  </g>
  <line x1="80" y1="150" x2="1120" y2="150" stroke="#171410" stroke-opacity="0.85" stroke-width="2.5" />

  <!-- logo tile -->
  <g transform="translate(80 64)">
    <rect width="56" height="56" rx="15" fill="#2545D9" />
    <g stroke="#ffffff" stroke-width="11" stroke-linecap="round" fill="none" transform="translate(28 28) scale(0.34) translate(-64 -64)">
      <g transform="rotate(0 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(60 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(120 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(180 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(240 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
      <g transform="rotate(300 64 64)"><path d="M64 56 C 71 46 86 48 92 60" /><circle cx="92" cy="60" r="6" fill="#ffffff" stroke="none" /></g>
    </g>
  </g>
  <text x="156" y="102" font-family="Georgia, serif" font-size="34" font-weight="700" letter-spacing="-0.5" fill="#171410">Coldcast</text>

  <!-- kicker -->
  <text x="80" y="196" font-family="'Consolas', 'Courier New', monospace" font-size="17" letter-spacing="4" fill="#6E685A">ACCOUNT-SAFE GTM SUITE — TESTED BY 10,000+ SALES PROFESSIONALS</text>

  <!-- headline: serif, cobalt italic on "safest" -->
  <text x="76" y="292" font-family="Georgia, serif" font-size="76" font-weight="700" letter-spacing="-1.5" fill="#171410">The <tspan font-style="italic" fill="#2545D9">safest</tspan> LinkedIn</text>
  <text x="76" y="378" font-family="Georgia, serif" font-size="76" font-weight="700" letter-spacing="-1.5" fill="#171410">Sales Navigator scraper.</text>

  <!-- ledger row -->
  <text x="80" y="500" font-family="'Consolas', 'Courier New', monospace" font-size="17" fill="#171410">Tiffanie K.   CRO   illumenature   tiffanie.k@illumenature.com</text>
  <g transform="translate(1010 480) rotate(-2)">
    <rect x="0" y="0" width="110" height="30" rx="4" fill="none" stroke="#1E7A44" stroke-width="2.5" />
    <text x="55" y="21" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="14" font-weight="700" letter-spacing="2" fill="#1E7A44">VERIFIED</text>
  </g>

  <!-- footer strip -->
  <text x="80" y="580" font-family="'Consolas', 'Courier New', monospace" font-size="15" letter-spacing="3" fill="#6E685A">20,000 LEADS/DAY  ·  0 BANS  ·  ONE SUBSCRIPTION</text>
  <text x="1120" y="580" text-anchor="end" font-family="'Consolas', 'Courier New', monospace" font-size="15" letter-spacing="2" fill="#2545D9">coldcast.io</text>
</svg>
