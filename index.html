            "logo": "https://coldcast.io/favicon.svg",
            "description": "Coldcast is an account-safe LinkedIn Sales Navigator scraper that exports and enriches leads — verified emails, phone numbers and buying-intent signals — from your own browser."
          },
          {
            "@type": "WebSite",
            "@id": "https://coldcast.io/#website",
            "url": "https://coldcast.io/",
            "name": "Coldcast",
            "description": "Account-safe LinkedIn Sales Navigator scraper and lead-enrichment tool.",
            "publisher": { "@id": "https://coldcast.io/#organization" },
            "inLanguage": "en-US"
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://coldcast.io/#software",
            "name": "Coldcast",
            "applicationCategory": "BusinessApplication",
            "applicationSubCategory": "Sales Intelligence / Lead Generation",
            "operatingSystem": "Google Chrome (browser extension)",
            "url": "https://coldcast.io/",
            "publisher": { "@id": "https://coldcast.io/#organization" },

    <!-- Structured data: FAQ rich result (mirrors the on-page FAQ section) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is it safe for my LinkedIn account?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — that’s the whole point of Coldcast. It runs through your own browser session and IP, only on pages you’re already logged into, at human pace with natural scrolling and click-to-next pagination. There are no headless browsers, no API hammering, and no bot fingerprints. We’ve used it daily with internal sales teams for 6+ months with zero account bans."
            }
          },
          {
            "@type": "Question",
            "name": "What intent signals does Coldcast capture?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Every export doubles as a signal layer, pulled live from your own Sales Navigator session — not from a stale third-party database. On the person side: job changes and new roles, promotions, time in current role, seniority and decision-maker fit, and recent LinkedIn activity. On the company side: headcount and growth, hiring activity, industry and firmographics, and company size. We tier them honestly so you can filter for clusters and time your outreach instead of blasting a flat list."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need Lusha, SalesQL, or ContactOut accounts?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "They’re optional. Coldcast enriches using whichever of these sources you’re already logged into — the more sources you connect, the more coverage you get on emails and phone numbers. You can also run it with just LinkedIn data if you prefer."
            }
          },
          {
            "@type": "Question",
            "name": "How accurate is the data, and how many data points do I get per lead?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Coldcast captures 30+ fields per lead — the profile and company data from Sales Navigator, plus emails and phones run through a waterfall across Lusha, SalesQL, and ContactOut in a single pass, so you export already enriched instead of cleaning up a raw CSV later. Contacts are verified, not guessed: every email passes a validation step before it lands in your file, so you can trust what you send."
            }
          },
          {
            "@type": "Question",
            "name": "What formats can I export?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "CSV and XLSX. Both download as clean, de-duplicated spreadsheets — signal columns included — that drop straight into your CRM or sequencer."
            }
          },
          {
            "@type": "Question",
            "name": "Does it work with regular LinkedIn or just Sales Navigator?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Coldcast is built specifically for Sales Navigator search — that’s where the structured, filterable lead data and richest signals live, and where Coldcast captures the exact search you’re viewing."
            }
          },
          {
            "@type": "Question",
            "name": "Is Coldcast GDPR-ready, and who owns the exported data?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your data stays yours. Scraping runs entirely in your own browser session, so your leads never pass through our servers, and we never sell your data or ask for your LinkedIn password. We handle personal data on a compliant footing and support data-access and deletion requests — full detail lives in our Privacy Policy. One honest note: scraping LinkedIn runs against its Terms of Service no matter which tool you use; Coldcast is built to reduce account risk, not to promise something we can’t guarantee."
            }
          },
          {
            "@type": "Question",
            "name": "Where does my data go?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Only to your own Coldcast workspace. Your leads are yours — we don’t sell or share your data with anyone."
            }
          },
          {
            "@type": "Question",
            "name": "Can I cancel anytime?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Plans are month-to-month and you can upgrade, downgrade, or cancel whenever you like."
            }
          }
        ]
      }
    </script>
  </head>
